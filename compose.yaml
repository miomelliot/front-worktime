name: worktime-stack

services:
  frontend:
    image: ${WORKTIME_FRONTEND_IMAGE:-worktime-frontend:local}
    build:
      context: .
      dockerfile: Dockerfile
      args:
        API_BASE_URL: ${API_BASE_URL:-/api/v1}
    ports:
      - "${FRONTEND_PORT:-8081}:80"
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped

  app:
    image: ${WORKTIME_IMAGE:-worktime:local}
    build:
      context: ./worktime
      dockerfile: Dockerfile
      args:
        GO_VERSION: ${GO_VERSION:-1.26.4}
        ALPINE_VERSION: ${ALPINE_VERSION:-3.22}
    environment:
      ENV: ${ENV:-local}
      TZ: ${TZ:-Europe/Moscow}
      HTTP_ADDR: ":8080"
      PG_DSN: postgres://worktime:worktime@postgres:5432/worktime?sslmode=disable
      AUTH_JWT_SECRET: ${AUTH_JWT_SECRET:-local-dev-secret-change-me}
      AUTH_ACCESS_TOKEN_TTL: ${AUTH_ACCESS_TOKEN_TTL:-15m}
      AUTH_ISSUER: ${AUTH_ISSUER:-worktime-local}
      KAFKA_BROKERS: kafka:9092
      KAFKA_INTEGRATION_TOPIC: ${KAFKA_INTEGRATION_TOPIC:-worktime.integration.events}
      KAFKA_INTEGRATION_GROUP_ID: ${KAFKA_INTEGRATION_GROUP_ID:-worktime-integration}
      KAFKA_OUTBOX_DEFAULT_TOPIC: ${KAFKA_OUTBOX_DEFAULT_TOPIC:-worktime.events}
      WORKERS_INTEGRATION_CONSUMER_ENABLED: ${WORKERS_INTEGRATION_CONSUMER_ENABLED:-true}
      WORKERS_OUTBOX_PUBLISHER_ENABLED: ${WORKERS_OUTBOX_PUBLISHER_ENABLED:-true}
      WORKERS_POLICY_CHECKER_ENABLED: ${WORKERS_POLICY_CHECKER_ENABLED:-true}
    ports:
      - "${HTTP_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    restart: unless-stopped

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: worktime
      POSTGRES_USER: worktime
      POSTGRES_PASSWORD: worktime
      TZ: ${TZ:-Europe/Moscow}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U worktime -d worktime"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  kafka:
    image: apache/kafka:3.9.1
    environment:
      CLUSTER_ID: "5L6g3nShT-eMCtK--X86sw"
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:29092"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092,EXTERNAL://localhost:29092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: "0"
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    ports:
      - "${KAFKA_PORT:-29092}:29092"
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 >/dev/null 2>&1",
        ]
      interval: 10s
      timeout: 10s
      retries: 60
      start_period: 30s
    restart: unless-stopped

  kafka-init:
    image: apache/kafka:3.9.1
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_INTEGRATION_TOPIC: ${KAFKA_INTEGRATION_TOPIC:-worktime.integration.events}
      KAFKA_OUTBOX_DEFAULT_TOPIC: ${KAFKA_OUTBOX_DEFAULT_TOPIC:-worktime.events}
    command:
      - /bin/bash
      - -ec
      - |
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic "$$KAFKA_INTEGRATION_TOPIC" --partitions 1 --replication-factor 1
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic "$$KAFKA_OUTBOX_DEFAULT_TOPIC" --partitions 1 --replication-factor 1

volumes:
  postgres-data:
  kafka-data:
