name: worktime
description: "Worktime — time tracking client (MVP) for the worktime Go backend."
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # HTTP
  dio: ^5.7.0

  # Navigation
  go_router: ^14.6.2

  # Models
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Token storage (secure on mobile/desktop, WebCrypto-backed on web)
  flutter_secure_storage: ^9.2.2

  # Misc
  intl: ^0.19.0
  collection: ^1.18.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

  # Codegen
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  riverpod_generator: ^2.6.3

flutter:
  uses-material-design: true
